# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "0.1.0"
  mojo_version: "=1.0.0b2"
  llvm_version: "18.*"
  rev: "8e4a4142aaa605c37f4daf33efa9345fdb6e7731"

package:
  name: "libclang_mojo"
  version: ${{ version }}

source:
  - git: https://github.com/MoSafi2/mojo_libclang.git
    rev: ${{ rev }}

build:
  number: 0
  script:
    interpreter: bash
    content:
      - |
        set -euo pipefail
        mkdir -p "${PREFIX}/lib" "${PREFIX}/lib/mojo"
        if [[ "$(uname -s)" == "Darwin" ]]; then
          "${CC}" -dynamiclib \
            -I"${PREFIX}/include" -Ishim \
            -o "${PREFIX}/lib/libclang_mojo_shim.dylib" \
            shim/libclang_mojo_shim.c \
            -L"${PREFIX}/lib" -lclang \
            -Wl,-rpath,"${PREFIX}/lib"
        else
          "${CC}" -shared -fPIC \
            -I"${PREFIX}/include" -Ishim \
            -o "${PREFIX}/lib/libclang_mojo_shim.so" \
            shim/libclang_mojo_shim.c \
            -L"${PREFIX}/lib" -lclang \
            -Wl,-rpath,"${PREFIX}/lib"
        fi
        mojo precompile clang -o "${PREFIX}/lib/mojo/clang.mojoc"

requirements:
  build:
    - ${{ compiler('c') }}
    - mojo-compiler ${{ mojo_version }}
  host:
    - clangdev ${{ llvm_version }}
    - libclang ${{ llvm_version }}
    - mojo-compiler ${{ mojo_version }}
  run:
    - libclang ${{ llvm_version }}
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - files:
      recipe:
        - test_cindex_smoke.mojo
    script:
      interpreter: bash
      content:
        - |
          set -euo pipefail
          export LD_LIBRARY_PATH="${PREFIX}/lib:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
          mojo run -I "${PREFIX}/lib/mojo" test_cindex_smoke.mojo

about:
  homepage: https://github.com/MoSafi2/mojo_libclang
  license: MIT
  license_file: LICENSE
  summary: High-level Mojo bindings for LLVM libclang
  repository: https://github.com/MoSafi2/mojo_libclang

extra:
  maintainers:
    - MoSafi2
  project_name: mojo_libclang

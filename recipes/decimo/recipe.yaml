context:
  version: "0.10.0"
  mojo_version: "=1.0.0b1"

package:
  name: "decimo"
  version: ${{ version }}

source:
  - git: https://github.com/forfudan/decimo.git
    rev: 95f5ca4e9118ea06a2d943c59adedee19c3cb1f7

build:
  number: 0
  script:
    - mkdir -p ${PREFIX}/lib/mojo
    - mojo package src/decimo -o ${PREFIX}/lib/mojo/decimo.mojopkg

requirements:
  host:
    - mojo-compiler ${{ mojo_version }}
  build:
    - mojo-compiler ${{ mojo_version }}
  run:
    - mojo-compiler ${{ mojo_version }}

about:
  homepage: https://github.com/forfudan/decimo
  license: Apache-2.0
  license_file: LICENSE
  summary: An arbitrary-precision integer and decimal library for Mojo, also with a 128-bit fixed-point decimal type.
  repository: https://github.com/forfudan/decimo.git

extra:
  project_name: decimo
  maintainers:
    - forfudan

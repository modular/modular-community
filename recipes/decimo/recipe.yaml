context:
  version: "0.11.0"
  mojo_version: "=1.0.0b2"

package:
  name: "decimo"
  version: ${{ version }}

source:
  - git: https://github.com/forfudan/decimo.git
    rev: e271f859a1f60f9b44b4edf7223fcec41ff8d052

build:
  number: 0
  script:
    - mkdir -p ${PREFIX}/lib/mojo
    - mojo precompile src/decimo -o ${PREFIX}/lib/mojo/decimo.mojoc

requirements:
  host:
    - mojo-compiler ${{ mojo_version }}
  build:
    - mojo-compiler ${{ mojo_version }}
  run:
    - mojo-compiler ${{ mojo_version }}

about:
  homepage: https://github.com/forfudan/decimo
  license: Apache-2.0
  license_file: LICENSE
  summary: An arbitrary-precision integer and decimal library for Mojo, also with a 128-bit fixed-point decimal type.
  repository: https://github.com/forfudan/decimo.git

extra:
  project_name: decimo
  maintainers:
    - forfudan

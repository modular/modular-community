context:
  version: 0.1.2

package:
  name: "emberjson"
  version: ${{ version }}

source:
 - git: https://github.com/bgreni/EmberJson.git
   rev: 8035a604d9551ed6da2758c54c737682c1d6c640

build:
  number: 0
  script:
    - mojo package emberjson -o ${{ PREFIX }}/lib/mojo/emberjson.mojopkg

requirements:
  host:
    - max =25.1
  run:
    - ${{ pin_compatible('max') }}

tests:
  - script:
    - if: unix
      then:
        - mojo test

about:
  homepage: https://github.com/bgreni/EmberJson
  license: MIT
  license_file: LICENSE
  summary: A lightweight JSON parsing library written in pure Mojo
  repository: https://github.com/bgreni/EmberJson

extra:
  maintainers:
    - bgreni
  project_name:
    - EmberJson
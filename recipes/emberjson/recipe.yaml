context:
  version: 0.3.3

package:
  name: "emberjson"
  version: ${{ version }}

source:
 - git: https://github.com/bgreni/EmberJson.git
   rev: fd0bf236a92f65365709bb0fe908c5def5a0fd16

build:
  number: 0
  script:
    - mojo precompile emberjson -o ${{ PREFIX }}/lib/mojo/emberjson.mojoc

requirements:
  host:
    - mojo-compiler =1.0.0b2
  build:
    - mojo-compiler =1.0.0b2
  run:
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - script:
    - if: unix
      then:
        - python run_tests.py
    files:
      source:
        - run_tests.py
        - test/
        - emberjson/
        - bench_data/
    requirements:
      build:
        - mojo =1.0.0b2
      run:
        - mojo =1.0.0b2

about:
  homepage: https://github.com/bgreni/EmberJson
  license: Apache-2.0
  license_file: LICENSE
  summary: A lightweight JSON parsing library written in pure Mojo
  repository: https://github.com/bgreni/EmberJson

extra:
  maintainers:
    - bgreni
  project_name:
    - EmberJson
context:
  version: "0.22.0"
  mojo_version: "=1.0.0b1"

package:
  name: "extramojo"
  version: ${{ version }}

source:
  - git: https://github.com/ExtraMojo/ExtraMojo.git
    rev: ce25d17d117b2956e669c808aa326f5a6fb4bbdc
  # path: .
  # use_gitignore: true

build:
  number: 0
  script:
    - mojo package extramojo -o ${{ PREFIX }}/lib/mojo/extramojo.mojopkg
requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
  run:
    - mojo-compiler ${{ mojo_version }}

tests:
  - script:
      - if: unix
        then:
          - |
            set -u
            echo "ExtraMojo package test diagnostics"
            uname -a
            command -v mojo
            mojo --version
            if command -v lscpu >/dev/null 2>&1; then
              lscpu
            fi
            first_test="$(find ./tests -name 'test_*.mojo' | sort | head -n 1)"
            mojo build --print-effective-target -I . -D ASSERT=all "${first_test}" || exit $?
            for test in $(find ./tests -name 'test_*.mojo' | sort); do
              echo "Running ${test} with mojo run"
              mojo run -debug-level=line-tables -I . -D ASSERT=all "${test}"
              status=$?
              if [ "${status}" -eq 0 ]; then
                continue
              fi
              echo "mojo run failed for ${test} with status ${status}; rebuilding with debug info"
              mojo build -debug-level=line-tables -I . -D ASSERT=all "${test}" -o /tmp/extramojo_test || exit "${status}"
              /tmp/extramojo_test || true
              exit "${status}"
            done
    requirements:
      build:
        - mojo ${{ mojo_version }}
      run:
        - mojo ${{ mojo_version }}
    files:
      source:
        - extramojo/
        - tests/

about:
  homepage: https://github.com/ExtraMojo/ExtraMojo
  license: "Unlicense OR MIT"
  license_file:
    - LICENSE-MIT
    - UNLICENSE
  summary: Extra functionality not yet in the standard library, mostly focused on strings and file IO.
  repository: https://github.com/ExtraMojo/ExtraMojo

extra:
  maintainers:
    - sstadick
  project_name: extramojo

# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "0.1.0"
  mojo_version: "=0.26.2"
  rev: "60aca7901fe2a87dc7da94afb70ea11bb218803e"

package:
  name: "mojo_raylib"
  version: ${{ version }}

source:
  - git: https://github.com/kivicode/mojo-raylib.git
    rev: ${{ rev }}

build:
  number: 0
  script:
    interpreter: bash
    content:
      - |
        set -euo pipefail
        bash shim/build.sh
        mkdir -p "${PREFIX}/lib/mojo"
        mojo package mojo_raylib -o "${PREFIX}/lib/mojo/mojo_raylib.mojopkg"

requirements:
  build:
    - ${{ compiler('c') }}
    - cmake
    - ninja
  host:
    - mojo-compiler ${{ mojo_version }}
    - if: linux
      then:
        - xorg-xorgproto
        - xorg-libx11
        - xorg-libxrandr
        - xorg-libxinerama
        - xorg-libxcursor
        - xorg-libxi
        - xorg-libxext
        - libgl-devel
  run:
    - mojo-compiler ${{ mojo_version }}
    - if: linux
      then:
        - xorg-libx11
        - xorg-libxrandr
        - xorg-libxinerama
        - xorg-libxcursor
        - xorg-libxi
        - xorg-libxext
        - libgl

tests:
  - script:
      - if: unix
        then:
          - mojo --version
    requirements:
      run:
        - mojo ${{ mojo_version }}

about:
  homepage: https://github.com/kivicode/mojo-raylib
  license: Zlib
  summary: |
    Auto-generated Mojo bindings for raylib (2D/3D graphics library)
  repository: https://github.com/kivicode/mojo-raylib

extra:
  maintainers:
    - kivicode
  project_name: mojo_raylib
